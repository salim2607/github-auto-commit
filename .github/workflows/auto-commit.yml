name: Contribution Automatique

on:
  schedule:
    - cron: "0 9 * * *"   # 9h00 UTC chaque jour
    - cron: "0 20 * * *"  # 20h00 UTC chaque jour
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  contribute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Run contribution script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: python auto_commit.py
